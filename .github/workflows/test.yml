name: Test

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - src-tauri/**
  pull_request:
    branches:
      - main
    paths:
      - src/**
      - src-tauri/**

# Cancel prev CI if new commit come (learned from ant-design repo)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      should_run_lint: ${{ steps.compute.outputs.should_run_lint }}
      should_run_build: ${{ steps.compute.outputs.should_run_build }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            src:
              - 'src/**'
            src-non-locales:
              - 'src/**'
              - '!src/locales/**'
            tauri:
              - 'src-tauri/**'

      - id: compute
        shell: bash
        run: |
          should_run_lint=false
          should_run_build=false

          if [ "${{ steps.filter.outputs.src }}" = "true" ] || [ "${{ steps.filter.outputs.tauri }}" = "true" ]; then
            should_run_lint=true
          fi

          if [ "${{ steps.filter.outputs.src-non-locales }}" = "true" ] || [ "${{ steps.filter.outputs.tauri }}" = "true" ]; then
            should_run_build=true
          fi

          echo "should_run_lint=$should_run_lint" >> "$GITHUB_OUTPUT"
          echo "should_run_build=$should_run_build" >> "$GITHUB_OUTPUT"

  Lint:
    needs: changes
    if: needs.changes.outputs.should_run_lint == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1
          run_install: false
      - run: pnpm install --frozen-lockfile
      
      - name: Lint JavaScript/TypeScript Frontend
        run: pnpm eslint 'src/**/*.{js,jsx,ts,tsx}' --no-fix --max-warnings=0
      
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Lint Rust Backend
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

  Build:
    needs: changes
    if: needs.changes.outputs.should_run_build == 'true'
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - platform: macos-latest
          #   args: '--target aarch64-apple-darwin'
          - platform: 'ubuntu-latest'
          - platform: 'windows-latest'

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - uses: pnpm/action-setup@v4
        with:
          version: 10.26.1
          run_install: false
      - run: pnpm install --frozen-lockfile

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.platform }}

      - name: Bump version for test build
        run: pnpm run version bump 0.0.1

      - name: Test Build
        run: pnpm tauri build --features devtools --no-bundle -- --profile test-build
        env:
          SJMCL_CURSEFORGE_API_KEY: ${{ secrets.SJMCL_CURSEFORGE_API_KEY }}
          # Exposed to Rust as compile-time constants by build.rs (all SJMCL_* env vars).
          SJMCL_BUILD_TYPE: test-build
          SJMCL_COMMIT_SHA: ${{ github.sha }}

      - name: Build portable artifact
        id: portable
        if: matrix.platform == 'windows-latest' || matrix.platform == 'ubuntu-latest'
        shell: bash
        run: |
          mkdir -p artifacts
          SHORT_SHA="${GITHUB_SHA:0:7}"
          if [ "${{ matrix.platform }}" = "windows-latest" ]; then
            OUTPUT_NAME="SJMCL_${SHORT_SHA}_windows_x86_64_portable.exe"
            python scripts/release/bundle_portable_assets.py -p "src-tauri/target/test-build/" -o "$OUTPUT_NAME" "SJMCL.exe"
          else
            OUTPUT_NAME="SJMCL_${SHORT_SHA}_linux_x86_64_portable"
            python scripts/release/bundle_portable_assets.py -p "src-tauri/target/test-build/" -o "$OUTPUT_NAME" "SJMCL"
          fi
          cp "src-tauri/target/test-build/$OUTPUT_NAME" artifacts/
          echo "output_name=$OUTPUT_NAME" >> "$GITHUB_OUTPUT"

      - name: Upload portable artifact
        if: matrix.platform == 'windows-latest' || matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          path: artifacts/${{ steps.portable.outputs.output_name }}
          archive: false
          if-no-files-found: error
