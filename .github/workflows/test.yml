name: Test

on:
  push:
    branches:
      - main
    paths:
      - src/**
      - src-tauri/**
  pull_request:
    branches:
      - main
    paths:
      - src/**
      - src-tauri/**

# Cancel prev CI if new commit come (learned from ant-design repo)
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  Changes:
    runs-on: ubuntu-latest
    outputs:
      should_run_lint: ${{ steps.compute.outputs.should_run_lint }}
      should_run_build: ${{ steps.compute.outputs.should_run_build }}
    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            src:
              - 'src/**'
            src_non_locales:
              - 'src/**'
              - '!src/locales/**'
            tauri:
              - 'src-tauri/**'

      - id: compute
        shell: bash
        run: |
          should_run_lint=false
          should_run_build=false

          if [ "${{ steps.filter.outputs.src }}" = "true" ] || [ "${{ steps.filter.outputs.tauri }}" = "true" ]; then
            should_run_lint=true
          fi

          if [ "${{ steps.filter.outputs.src_non_locales }}" = "true" ] || [ "${{ steps.filter.outputs.tauri }}" = "true" ]; then
            should_run_build=true
          fi

          echo "should_run_lint=$should_run_lint" >> "$GITHUB_OUTPUT"
          echo "should_run_build=$should_run_build" >> "$GITHUB_OUTPUT"

  Lint:
    needs: Changes
    if: needs.Changes.outputs.should_run_lint == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm install
      
      - name: Lint JavaScript/TypeScript Frontend
        run: npx eslint 'src/**/*.{js,jsx,ts,tsx}' --no-fix --max-warnings=0 
      
      - uses: actions-rs/toolchain@v1
        with:
          profile: minimal
          toolchain: stable
          override: true
          components: rustfmt

      - name: Lint Rust Backend
        run: |
          find src-tauri/src -name '*.rs' | xargs rustfmt --check

  Build:
    needs: Changes
    if: needs.Changes.outputs.should_run_build == 'true'
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # - platform: macos-latest
          #   args: '--target aarch64-apple-darwin'
          - platform: 'ubuntu-latest'
            args: ''
          # - platform: 'windows-latest'
          #   args: ''

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - run: npm install

      - uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
          target: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"
          key: ${{ matrix.platform }}-${{ matrix.args }}

      - name: Test Build
        run: npx tauri build ${{ matrix.args }}
        env:
          SJMCL_CURSEFORGE_API_KEY: ${{ secrets.SJMCL_CURSEFORGE_API_KEY }}
