name: sjmcl 
base: core22
version: '0.0.0'
summary: SJMCL Minecraft Launcher
description: |
  SJMC Minecraft Launcher. A modern, lightweight Minecraft launcher.

grade: stable
confinement: strict

apps:
  sjmcl:
    command: usr/bin/SJMCL
    desktop: usr/share/applications/SJMCL.desktop
    extensions: [gnome]
    plugs:
      - network
      - network-bind
      - opengl
      - audio-playback
      - removable-media
      - home

parts:
  sjmcl-payload:
    plugin: dump
    source: snap-payload
    stage-packages:
      - libwebkit2gtk-4.1-0
      - libayatana-appindicator3-1
      - libsoup-3.0-0